name: Golden Diff Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies and build
        run: npm ci

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Build demo app
        working-directory: demo
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python comparison tool
        run: pip install --quiet -e python/

      - name: Install cairosvg system deps
        run: sudo apt-get install -y --no-install-recommends libcairo2 libpango-1.0-0 libpangocairo-1.0-0

      - name: Run structural comparison
        run: TIKZJS_REPORT_DIR=./gh-pages/report python -m tikzjs_compare

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
